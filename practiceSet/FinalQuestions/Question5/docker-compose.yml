services: 
  mongodb:
    image: mongo
    container_name: mongodb
    volumes: 
      - mongo-data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend
    ports:
    - "3000:3000"
    depends_on: 
      - mongodb
    networks:
      - app-network


  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes: 
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo-data:
networks:
  app-network: